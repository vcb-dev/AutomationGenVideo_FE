<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<title>Cài đặt VCB Video Downloader</title>
<style>
    body { font-family: -apple-system, Segoe UI, Roboto, sans-serif; max-width: 420px; margin: 32px auto; color: #1f2937; }
    h1 { font-size: 16px; margin-bottom: 4px; }
    p { font-size: 13px; color: #6b7280; margin-top: 0; }
    label { display: block; font-size: 13px; font-weight: 600; margin: 16px 0 6px; }
    input { width: 100%; box-sizing: border-box; padding: 8px 10px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 13px; }

    button:hover { background: #6d28d9; }
    #status { margin-top: 10px; font-size: 12px; color: #16a34a; height: 16px; }

</head>
<body>
    <h1>VCB Video Downloader — Cài đặt</h1>
    <p>Nhập địa chỉ trang web hệ thống bạn đang dùng (ví dụ link Cloudflare Tunnel hiện tại hoặc domain nội bộ).</p>
    <label for="appBase">Địa chỉ trang web</label>
    <input id="appBase" type="url" placeholder="https://xxxx.trycloudflare.com" />
    <button id="save">Lưu</button>
    <div id="status"></div>
    <script src="options.js"></script>
</body>
</html>
